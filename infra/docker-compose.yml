version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: softhouse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: softhouse
      POSTGRES_PASSWORD: softhouse
      POSTGRES_DB: softhouse_central
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7
    container_name: softhouse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
